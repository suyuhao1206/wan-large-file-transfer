events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 0; # Disable limit for large file uploads

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:8080;
    }

    server {
        listen       80;
        server_name  filegj.top;
        return 301 https://filegj.top;
    }

    server {
        listen       443 ssl;
        server_name  filegj.top; # 请修改为你的域名

        ssl_certificate      /etc/nginx/certs/filegj.top.pem; # 确保证书文件名一致
        ssl_certificate_key  /etc/nginx/certs/filegj.top.key; # 确保私钥文件名一致

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Backend API
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Tusd Uploads
        location /files/ {
            proxy_pass http://backend;
            proxy_request_buffering off; # Important for TUS
            proxy_buffering off;         # Important for TUS
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Increase timeout for large file downloads
            proxy_read_timeout 86400s; 
            proxy_send_timeout 86400s;
            
            # TUS headers
            proxy_set_header Tus-Resumable $http_tus_resumable;
            proxy_set_header Upload-Length $http_upload_length;
            proxy_set_header Upload-Metadata $http_upload_metadata;
            proxy_set_header Upload-Offset $http_upload_offset;
        }
    }
}
