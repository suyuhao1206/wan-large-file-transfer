services:
  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=filecodebox
      - DB_PASSWORD=filecodebox
      - DB_NAME=filecodebox
      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_ENDPOINT=http://8.145.57.148:9000
      - S3_BUCKET=uploads
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_REGION=us-east-1
      - TUSD_UPLOAD_DIR=/data/uploads
      - SHARE_CODE_TTL_MINUTES=120
      - SHARE_CODE_MAX_DOWNLOADS=10000
      - CORS_ORIGINS=*
      - ENABLE_DEBUG_ENDPOINTS=false
      - PORT=8080
      - API_KEY=${API_KEY:-}
      - ADMIN_KEY=${ADMIN_KEY:-}
    volumes:
      - tusd-data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=filecodebox
      - POSTGRES_PASSWORD=filecodebox
      - POSTGRES_DB=filecodebox
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filecodebox"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  tusd-data:
